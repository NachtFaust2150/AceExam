{% extends "base.html" %}
{% block title %}Login — AceExam{% endblock %}
{% block body %}
<div class="login-wrapper">
  <div class="card login-card">
    <div class="login-header">
      <div class="login-icon">🎓</div>
      <h1 class="login-brand">AceExam</h1>
      <p class="login-subtitle">Accessible Assessment Platform</p>
    </div>

    <div id="login-error" class="alert alert-danger" style="display:none;" role="alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="name@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In to Portal</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Authenticating...';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In to Portal';
      return;
    }
    // Redirect based on role
    const routes = {organisation: '/org', teacher: '/teacher', student: '/student'};
    window.location.href = routes[data.role] || '/';
  } catch (err) {
    errEl.textContent = 'Connection failed: ' + err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In to Portal';
  }
});
</script>
{% endblock %}
